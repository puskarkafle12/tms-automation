<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern User Form</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white flex justify-center items-center min-h-screen">
    <div class="w-full max-w-2xl p-6 bg-gray-800 shadow-lg rounded-lg m-5">

        <div class="flex items-center justify-between w-full">
            <h2 class="text-2xl font-bold mb-4 text-center">User Registration</h2>
            <button class="ml-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-600" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="setting">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1.82.33 1.65 1.65 0 0 0-.33 1.82l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82-.33A1.65 1.65 0 0 0 6 19.4a1.65 1.65 0 0 0-.33-1.82A1.65 1.65 0 0 0 3.85 15l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 9a1.65 1.65 0 0 0 1.82-.33 1.65 1.65 0 0 0 .33-1.82l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 15 9a1.65 1.65 0 0 0 1.82.33A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 15a1.65 1.65 0 0 0 1.82.33z">
                    </path>
                </svg>
            </button>
        </div>

        <form id="userForm" class="space-y-4">
            <input type="hidden" id="editIndex">
            <div>
                <label class="block text-sm font-medium">Demat Bank Name</label>
                <input type="hidden" id="clientId" required>
                <input type="text" id="dpName" class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white">
                <!-- Dropdown list for suggestions -->
                <ul id="suggestionList" 
                class="absolute z-50 mt-1 p-2 bg-gray-800 border border-gray-600 rounded text-white w-200 max-h-40 overflow-y-auto hidden">
                <!-- Suggestions will appear here -->
                </ul>
            </div>

            <div>
                <label class="block text-sm font-medium">Username</label>
                <input type="text" id="username"
                    class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white" required>
            </div>

            <div class="relative">
                <label class="block text-sm font-medium">Password</label>
                <input type="password" id="password"
                    class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white" required>

                <!-- Eye Icon to toggle password visibility -->
                <span id="togglePassword"
                    class="absolute p-2 mt-6 inset-y-0 right-0 flex items-center pr-3 cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        class="w-6 h-6 text-gray-500">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12c0 1.5-1.5 3-3 3s-3-1.5-3-3s1.5-3 3-3s3 1.5 3 3zM12 3c4.5 0 8 3 8 7s-3.5 7-8 7c-2.5 0-4.7-.9-6.3-2.5m0 0C7.3 9.9 5 7 5 4C5 2 6.5 1 8 1s5 2 5 5z" />
                    </svg>
                </span>
            </div>

            <script>
                // JavaScript to toggle password visibility
                const togglePassword = document.getElementById('togglePassword');
                const passwordInput = document.getElementById('password');

                togglePassword.addEventListener('click', function () {
                    // Toggle the input type
                    const type = passwordInput.type === 'password' ? 'text' : 'password';
                    passwordInput.type = type;

                    // Optionally change the icon
                    togglePassword.querySelector('svg').classList.toggle('text-gray-500');
                    togglePassword.querySelector('svg').classList.toggle('text-blue-500');
                });
            </script>
            <div>
                <label class="block text-sm font-medium">CRN Number</label>
                <input type="text" id="crnNumber"
                    class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white" required>
            </div>

            <div>
                <label class="block text-sm font-medium">PIN</label>
                <input type="text" id="pin" class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white"
                    required>
            </div>



            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 rounded">Save
                User</button>
            <button type="button" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded"
                onclick="window.location.href='ipo_applier.html'">
                Bulk IPO Apply
            </button>


        </form>
        <h3 class="text-xl font-semibold mt-6">Stored Users</h3>
        <ul id="userList" class="mt-3 space-y-2"></ul>

        <!-- Modal for importing via data -->
        <div id="visaModal"
            class="hidden fixed inset-0 bg-gray-800 bg-opacity-50 flex justify-center items-center z-10">
            <div class="bg-gray-700 p-6 rounded-lg w-1/2">
                <h3 class="text-xl font-semibold mb-4">Import Via JSON</h3>
                <textarea id="savedData" rows="8"
                    class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-white"></textarea>
                <form>
                    <label for="limit">Past Result Count: </label>
                    <input class=" p-2 rounded bg-gray-800 border border-gray-600 text-white" type="text" name="limit"
                        id="limit">
                </form>
                <div class="mt-4 flex justify-end space-x-4">
                    <button type="button" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded"
                        onclick="closeVisaModal()">Cancel</button>
                    <button type="button" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded"
                        onclick="saveJsonData()">Save Data</button>
                </div>
            </div>
        </div>
    </div>

    <script>

        document.addEventListener("DOMContentLoaded", () => {


            // let users = JSON.parse(localStorage.getItem("users")) || [];
            displayUsers();

            document.getElementById("userForm").addEventListener("submit", async (e) => {

                e.preventDefault();
                let users = JSON.parse(localStorage.getItem("users")) || [];
                const editIndex = document.getElementById("editIndex").value;
                const clientId = document.getElementById("clientId").value;
                const username = document.getElementById("username").value.trim();
                const password = document.getElementById("password").value;
                const crnNumber = document.getElementById("crnNumber").value;
                const pin = document.getElementById("pin").value;
                const dpName = document.getElementById("dpName").value;

                if (!isUsernameUnique(username, editIndex)) {
                    alert("Username must be unique!");
                    return;
                }

                if (editIndex) {
                    users[editIndex] = { clientId, username, password: password, crnNumber, pin, dpName };
                } else {
                    const newUser = { clientId, username, password: password, crnNumber, pin, dpName };
                    users.push(newUser);
                }

                localStorage.setItem("users", JSON.stringify(users));
                displayUsers();
                document.getElementById("userForm").reset();
                document.getElementById("editIndex").value = "";
                document.getElementById("clientId").value = "";
            });
            setting = document.getElementById('setting')
            setting.addEventListener('click', (event) => {
                event.preventDefault();
                openVisaModal();
            });
            document.addEventListener('keydown', (event) => {
                if ((event.ctrlKey || event.metaKey) && event.key === 's') {
                    event.preventDefault();  // Prevent default browser behavior
                    openVisaModal();
                }
            });
            const clientIdInput = document.getElementById('clientId');
            const dpName = document.getElementById('dpName');
            const suggestionList = document.getElementById('suggestionList');
            // Event listener for user input
            let selected_item = {}
            dpName.addEventListener('input', async () => {
                const query = dpName.value.trim();

                // Hide suggestion list if input is empty
                if (!query) {
                    suggestionList.classList.add('hidden');
                    suggestionList.innerHTML = '';  // Clear previous suggestions
                    return;
                }

                // Get matching results from the searchCapital function
                const results = await searchCapital(query);
                selected_item = results
                // If there are matching results, display them
                if (results.length > 0) {
                    suggestionList.classList.remove('hidden');
                    suggestionList.innerHTML = '';  // Clear previous results

                    // Add results to the dropdown list
                    results.forEach(item => {
                        const li = document.createElement('li');
                        li.classList.add('p-3', 'rounded-lg');
                        li.textContent = `${item.name}`;  // Display name and code in the suggestion

                        li.addEventListener('click', () => {
                            // Populate the input with the selected value
                            clientIdInput.value = item.id;
                            dpName.value = item.name;
                            suggestionList.classList.add('hidden'); // Hide the suggestions after selection
                        });
                        suggestionList.appendChild(li);
                    });
                } else {
                    suggestionList.classList.add('hidden');
                }
            });
            const input = document.getElementById("dpName");

            // Select top suggestion when pressing Enter
            input.addEventListener("keydown", function (event) {
                if (event.key === "Enter" && suggestionList.children.length > 0) {
                    event.preventDefault(); // Prevent form submission
                    input.value = selected_item[0].name;
                    clientIdInput.value = selected_item[0].id;
                    suggestionList.classList.add("hidden");
                }
            });

            // Close suggestion list when clicking outside
            document.addEventListener('click', (e) => {
                if (!clientIdInput.contains(e.target) && !suggestionList.contains(e.target)) {
                    suggestionList.classList.add('hidden');
                }
            });

        });

        function isUsernameUnique(username, editIndex) {
            let users = JSON.parse(localStorage.getItem("users")) || [];
            return !users.some((user, index) => user.username.toLowerCase() === username.toLowerCase() && index != editIndex);
        }

        function displayUsers() {
            const userList = document.getElementById("userList");
            userList.innerHTML = "";
            let users = JSON.parse(localStorage.getItem("users")) || [];

            users.forEach((user, index) => {
                const userItem = document.createElement("li");
                userItem.classList = "p-3 bg-gray-700 rounded flex justify-between items-center";
                userItem.innerHTML = `
                    <div>
                        <p class="font-medium">${user.username} ${user.dpName}</p>
                        <p class="text-sm text-gray-400">CRN: ${user.crnNumber} | PIN: ${user.pin}</p>
                    </div>
                    <div>
                        <button onclick="editUser(${index})" class="bg-yellow-500 px-2 py-1 text-white rounded">Edit</button>
                        <button onclick="deleteUser(${index})" class="bg-red-500 px-2 py-1 text-white rounded ml-2">Delete</button>
                    </div>
                `;
                userList.appendChild(userItem);
            });
        }

        function deleteUser(index) {
            let users = JSON.parse(localStorage.getItem("users")) || [];
            users.splice(index, 1);
            localStorage.setItem("users", JSON.stringify(users));
            displayUsers();
        }

        function editUser(index) {
            let users = JSON.parse(localStorage.getItem("users")) || [];
            const user = users[index];

            document.getElementById("editIndex").value = index;
            document.getElementById("clientId").value = user.clientId;
            document.getElementById("username").value = user.username;
            document.getElementById("password").value = user.password;
            document.getElementById("crnNumber").value = user.crnNumber;
            document.getElementById("pin").value = user.pin;
            document.getElementById("clientId").value = user.clientId;
            document.getElementById("dpName").value = user.dpName;
        }

        // Modal open and close functions
        function openVisaModal() {
            document.getElementById("visaModal").classList.remove("hidden");
            document.getElementById("savedData").value = localStorage.getItem('users') || '';

        }
        function closeVisaModal() {
            document.getElementById("visaModal").classList.add("hidden");
        }

        // Save the visa data to localStorage
        function saveJsonData() {
            const visaJson = document.getElementById("savedData").value;
            try {
                const visaArray = JSON.parse(visaJson);
                localStorage.setItem("users", JSON.stringify(visaArray));
                displayUsers(); // Display the newly loaded users
                closeVisaModal();
            } catch (e) {
                alert("Invalid JSON format. Please check the syntax.");
            }

        }
        // Function to search by name or code directly
        async function searchCapital(query) {
            let capitalData = JSON.parse(localStorage.getItem("capitalData"));

            // If data is not in localStorage, fetch from API
            if (!capitalData) {
                console.log("Fetching data from API...");
                capitalData = await fetchAndStoreCapitalData();
            }

            // Convert query to lowercase for case-insensitive search
            query = query.toLowerCase();

            // Filter and rank by how closely the query matches the combined name + code string
            const results = capitalData.map(item => {
                // Combine the name and code into a single string for matching
                const combinedString = `${item.name} ${item.code}`.toLowerCase();
                // Check if the query matches the combined string
                const isMatch = combinedString.includes(query);
                item.name = combinedString
                // Calculate match score: 1 point for a match in the combined string
                return isMatch ? item : null; // If matched, return the name, otherwise null
            })
                .filter(result => result !== null); // Filter out null values (non-matches)

            return results; // Return the array of matched names
        }

        // Fetch and store capital data in localStorage
        async function fetchAndStoreCapitalData() {
            try {
                const response = await fetch("https://webbackend.cdsc.com.np/api/meroShare/capital/");
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                const capitalData = await response.json(); // Convert to JSON
                // Store data in localStorage
                localStorage.setItem("capitalData", JSON.stringify(capitalData));
                return capitalData;
            } catch (error) {
                console.error("Error fetching capital data:", error);
                return [];
            }
        }


    </script>
    <script>
        // Get the input element by ID
        const limitInput = document.getElementById('limit');

        // Check if there is a saved value in localStorage and set it to the input
        if (localStorage.getItem('limit')) {
            limitInput.value = localStorage.getItem('limit');
        }

        // Listen for the input event on the limit field
        limitInput.addEventListener('input', function () {
            // Save the current value of the input to localStorage
            localStorage.setItem('limit', limitInput.value);
        });
    </script>
</body>

</html>
