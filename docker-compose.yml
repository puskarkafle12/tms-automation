version: '3.8'

services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - mynetwork

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - mynetwork
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_NAME: stock

  ngrok:
    image: ngrok/ngrok:latest
    ports:
      - "4040:4040" # Dashboard
    environment:
      NGROK_AUTHTOKEN: 2joXsvN4glIHO7DeEe7XZ9LSWyA_3T7Sxk2Gg7ndcG1gFetQY # replace with your actual Ngrok authentication token
    command: ngrok http web:8000
    depends_on:
      - web
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: bridge
